version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: frontend-dev
    volumes:
      - /frontend:/frontend
      - /frontend/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: backend-dev
    # volumes:
    #   - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - ollama
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  postgres:
    image: postgres:15
    container_name: postgres-dev
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    # volumes:
    #   - docker/dev/postgres:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    container_name: ollama-dev
    ports:
      - "11434:11434"
    # volumes:
    #   - ./docker/dev/ollama:/root/.ollama

volumes:
  postgres: